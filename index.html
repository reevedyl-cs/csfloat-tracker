<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Steam Market Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:#f8fafc;
margin:0;
padding:24px;
}

.card{
max-width:920px;
margin:auto;
background:#1e293b;
border-radius:18px;
padding:24px;
}

h1{
margin:0 0 12px 0;
font-size:40px;
}

.muted{
color:#94a3b8;
margin-bottom:16px;
}

input,button{
border:none;
border-radius:14px;
padding:16px;
font-size:18px;
width:100%;
box-sizing:border-box;
}

input{
background:#475569;
color:white;
}

button{
background:#2563eb;
color:white;
margin-top:12px;
}

.summary{
margin-top:16px;
background:#0b132b;
border-radius:14px;
padding:18px;
white-space:pre-wrap;
}

canvas{
margin-top:30px;
background:#0b132b;
border-radius:14px;
padding:10px;
}

</style>

</head>


<body>

<div class="card">

<h1>Steam Market Tracker</h1>

<div class="muted">
Search skins like <b>deag blaze</b>, <b>lightning fn</b>, or <b>fire serp ft</b>
</div>

<input id="marketHashName">

<button onclick="manualSearch()">Search</button>

<div id="summary" class="summary">No search yet.</div>

<canvas id="priceChart"></canvas>

</div>



<script src="/skins.js"></script>

<script>

const summary = document.getElementById("summary")
let chart


async function manualSearch(){

const name = document.getElementById("marketHashName").value.trim()

if(!name){
summary.textContent="Enter a skin name."
return
}

await loadPrice(name)
await loadHistory(name)

}


async function loadPrice(name){

const params = new URLSearchParams({
market_hash_name:name,
currency:"1"
})

const res = await fetch(`/api/steam-price?${params}`)

const data = await res.json()

summary.textContent=
`Item: ${name}
Success: ${data.success}
Lowest price: ${data.lowest_price || "N/A"}
Median price: ${data.median_price || "N/A"}
Volume: ${data.volume || "N/A"}`

}


async function loadHistory(name){

try{

const res = await fetch(`/api/steam-history?market_hash_name=${encodeURIComponent(name)}`)

const data = await res.json()

if(!data.prices){
console.log("No price history returned")
return
}

const labels = data.prices.map(p=>p[0])
const prices = data.prices.map(p=>parseFloat(p[1]))

if(chart) chart.destroy()

chart = new Chart(document.getElementById("priceChart"),{

type:"line",

data:{
labels:labels,

datasets:[{
label:"Steam Price",
data:prices,
borderWidth:2
}]

},

options:{
responsive:true,
plugins:{
legend:{
display:true
}
}
}

})

}catch(err){

console.log("Chart error",err)

}

}

</script>

</body>

</html>
