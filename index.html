<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steam Market Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 24px;
    }

    .card {
      max-width: 920px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 18px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 44px;
      line-height: 1.05;
    }

    .muted {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 14px;
    }

    input, button, select {
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 18px;
      box-sizing: border-box;
    }

    input, select {
      background: #475569;
      color: white;
      width: 100%;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      min-width: 110px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .summary {
      margin-top: 16px;
      background: #0b132b;
      border-radius: 14px;
      padding: 18px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 17px;
    }

    @media (max-width: 760px) {
      h1 {
        font-size: 34px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Steam Market Tracker</h1>

    <div class="muted">
      Search any CS2 skin by exact Steam market name.
    </div>

    <div class="row">
      <input
        id="marketHashName"
        type="text"
        placeholder="Example: AWP | Lightning Strike (Factory New)"
        value="AWP | Lightning Strike (Factory New)"
      />
      <button onclick="searchSteamPrice()">Search</button>
    </div>

    <div class="muted">
      Example names:
      <br />AWP | Lightning Strike (Factory New)
      <br />AK-47 | Redline (Field-Tested)
      <br />M4A1-S | Blue Phosphor (Factory New)
    </div>

    <div id="summary" class="summary">No search yet.</div>
  </div>

  <script>
    async function searchSteamPrice() {
      const marketHashName = document.getElementById("marketHashName").value.trim()
      const summary = document.getElementById("summary")

      if (!marketHashName) {
        summary.textContent = "Please enter a market_hash_name."
        return
      }

      summary.textContent = "Loading..."

      const params = new URLSearchParams({
        market_hash_name: marketHashName,
        currency: "1"
      })

      try {
        const res = await fetch(`/api/steam-price?${params.toString()}`, {
          headers: {
            Accept: "application/json"
          }
        })

        const text = await res.text()

        let data
        try {
          data = JSON.parse(text)
        } catch {
          summary.textContent =
`Server did not return JSON.
Status: ${res.status}

Preview:
${text.slice(0, 500)}`
          return
        }

        if (!res.ok) {
          summary.textContent =
`Request failed.
Status: ${res.status}

${JSON.stringify(data, null, 2)}`
          return
        }

        if (!data.success) {
          summary.textContent =
`Steam returned success: false

${JSON.stringify(data, null, 2)}`
          return
        }

        summary.textContent =
`Item: ${marketHashName}
Success: ${data.success}
Lowest price: ${data.lowest_price || "N/A"}
Median price: ${data.median_price || "N/A"}
Volume: ${data.volume || "N/A"}`
      } catch (err) {
        summary.textContent = `Error: ${err.message}`
      }
    }
  </script>
</body>
</html>
