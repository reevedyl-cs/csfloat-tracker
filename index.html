<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steam Market Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 24px;
    }

    .card {
      max-width: 920px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 18px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 44px;
      line-height: 1.05;
    }

    .muted {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 14px;
    }

    input, button {
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 18px;
      box-sizing: border-box;
    }

    input {
      background: #475569;
      color: white;
      width: 100%;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      min-width: 110px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .summary {
      margin-top: 16px;
      background: #0b132b;
      border-radius: 14px;
      padding: 18px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 17px;
    }

    .suggestions {
      margin-top: 16px;
    }

    .suggestion-title {
      color: #cbd5e1;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .suggestion-btn {
      display: block;
      width: 100%;
      text-align: left;
      margin-bottom: 10px;
      background: #334155;
      color: white;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
    }

    .quick-buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
      margin-bottom: 18px;
    }

    .quick-buttons button {
      min-width: 0;
      background: #334155;
    }

    .quick-buttons button:hover {
      background: #475569;
    }

    @media (max-width: 760px) {
      h1 {
        font-size: 34px;
      }

      .row,
      .quick-buttons {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Steam Market Tracker</h1>

    <div class="muted">
      Search any CS2 skin by simple name or exact Steam market name.
    </div>

    <div class="row">
      <input
        id="marketHashName"
        type="text"
        placeholder="Example: deagle blaze, lightning strike fn, fire serpent ft"
        value="deagle blaze"
      />
      <button onclick="handleSearch()">Search</button>
    </div>

    <div class="muted">
      Simple examples:
      <br />deagle blaze
      <br />lightning strike fn
      <br />fire serpent ft
      <br />blue phosphor fn
    </div>

    <div class="quick-buttons">
      <button onclick="quickSearch('deagle blaze')">Deagle Blaze</button>
      <button onclick="quickSearch('lightning strike fn')">Lightning Strike FN</button>
      <button onclick="quickSearch('fire serpent ft')">Fire Serpent FT</button>
      <button onclick="quickSearch('blue phosphor fn')">Blue Phosphor FN</button>
    </div>

    <div id="summary" class="summary">No search yet.</div>
    <div id="suggestions" class="suggestions"></div>
  </div>

  <script>
    const exactItems = [
      "AWP | Lightning Strike (Factory New)",
      "AWP | Lightning Strike (Minimal Wear)",
      "AWP | Lightning Strike (Field-Tested)",
      "Desert Eagle | Blaze (Factory New)",
      "Desert Eagle | Blaze (Minimal Wear)",
      "AK-47 | Fire Serpent (Factory New)",
      "AK-47 | Fire Serpent (Minimal Wear)",
      "AK-47 | Fire Serpent (Field-Tested)",
      "AK-47 | Fire Serpent (Well-Worn)",
      "AK-47 | Fire Serpent (Battle-Scarred)",
      "M4A1-S | Blue Phosphor (Factory New)",
      "M4A1-S | Blue Phosphor (Minimal Wear)",
      "Glock-18 | Fade (Factory New)",
      "Glock-18 | Fade (Minimal Wear)",
      "AWP | Dragon Lore (Factory New)",
      "AWP | Dragon Lore (Minimal Wear)",
      "AWP | Dragon Lore (Field-Tested)",
      "AWP | Dragon Lore (Well-Worn)",
      "AWP | Dragon Lore (Battle-Scarred)",
      "AK-47 | Redline (Field-Tested)",
      "AK-47 | Redline (Minimal Wear)",
      "AK-47 | Redline (Well-Worn)",
      "M4A4 | Howl (Factory New)",
      "M4A4 | Howl (Minimal Wear)",
      "M4A4 | Howl (Field-Tested)",
      "USP-S | Kill Confirmed (Factory New)",
      "USP-S | Kill Confirmed (Minimal Wear)",
      "USP-S | Kill Confirmed (Field-Tested)"
    ];

    const aliases = {
      "deagle blaze": "Desert Eagle | Blaze (Factory New)",
      "blaze fn": "Desert Eagle | Blaze (Factory New)",
      "desert eagle blaze": "Desert Eagle | Blaze (Factory New)",
      "desert eagle blaze fn": "Desert Eagle | Blaze (Factory New)",

      "lightning strike": "AWP | Lightning Strike (Factory New)",
      "awp lightning strike": "AWP | Lightning Strike (Factory New)",
      "lightning strike fn": "AWP | Lightning Strike (Factory New)",
      "awp lightning strike fn": "AWP | Lightning Strike (Factory New)",
      "lightning strike mw": "AWP | Lightning Strike (Minimal Wear)",
      "lightning strike ft": "AWP | Lightning Strike (Field-Tested)",

      "fire serpent": "AK-47 | Fire Serpent (Field-Tested)",
      "fire serpent ft": "AK-47 | Fire Serpent (Field-Tested)",
      "fire serpent fn": "AK-47 | Fire Serpent (Factory New)",
      "fire serpent mw": "AK-47 | Fire Serpent (Minimal Wear)",
      "ak fire serpent": "AK-47 | Fire Serpent (Field-Tested)",

      "blue phosphor": "M4A1-S | Blue Phosphor (Factory New)",
      "blue phosphor fn": "M4A1-S | Blue Phosphor (Factory New)",
      "m4 blue phosphor": "M4A1-S | Blue Phosphor (Factory New)",

      "glock fade": "Glock-18 | Fade (Factory New)",
      "glock fade fn": "Glock-18 | Fade (Factory New)",

      "dragon lore": "AWP | Dragon Lore (Field-Tested)",
      "dragon lore ft": "AWP | Dragon Lore (Field-Tested)",
      "dragon lore fn": "AWP | Dragon Lore (Factory New)",
      "dragon lore mw": "AWP | Dragon Lore (Minimal Wear)",

      "ak redline": "AK-47 | Redline (Field-Tested)",
      "ak redline ft": "AK-47 | Redline (Field-Tested)",

      "howl": "M4A4 | Howl (Field-Tested)",
      "howl fn": "M4A4 | Howl (Factory New)",

      "kill confirmed": "USP-S | Kill Confirmed (Field-Tested)",
      "kill confirmed fn": "USP-S | Kill Confirmed (Factory New)"
    };

    function normalize(text) {
      return text
        .toLowerCase()
        .replace(/[|()-]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function scoreMatch(query, item) {
      const q = normalize(query);
      const i = normalize(item);

      if (i === q) return 1000;
      if (i.includes(q)) return 500 + q.length;

      const words = q.split(" ").filter(Boolean);
      let score = 0;

      for (const word of words) {
        if (i.includes(word)) score += 10;
      }

      return score;
    }

    function getSuggestions(query) {
      const scored = exactItems
        .map(item => ({ item, score: scoreMatch(query, item) }))
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 5);

      return scored.map(x => x.item);
    }

    function renderSuggestions(items) {
      const suggestionsDiv = document.getElementById("suggestions");

      if (!items.length) {
        suggestionsDiv.innerHTML = "";
        return;
      }

      suggestionsDiv.innerHTML = `
        <div class="suggestion-title">Tap a suggestion:</div>
        ${items.map(item => `
          <button class="suggestion-btn" onclick="searchExact(${JSON.stringify(item)})">
            ${item}
          </button>
        `).join("")}
      `;
    }

    async function searchSteamPrice(exactName) {
      const summary = document.getElementById("summary");
      const suggestionsDiv = document.getElementById("suggestions");

      summary.textContent = "Loading...";
      suggestionsDiv.innerHTML = "";

      const params = new URLSearchParams({
        market_hash_name: exactName,
        currency: "1"
      });

      try {
        const res = await fetch(`/api/steam-price?${params.toString()}`, {
          headers: {
            Accept: "application/json"
          }
        });

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          summary.textContent =
`Server did not return JSON.
Status: ${res.status}

Preview:
${text.slice(0, 500)}`;
          return;
        }

        if (!res.ok) {
          summary.textContent =
`Request failed.
Status: ${res.status}

${JSON.stringify(data, null, 2)}`;
          return;
        }

        if (!data.success) {
          summary.textContent =
`Steam returned success: false

${JSON.stringify(data, null, 2)}`;
          return;
        }

        summary.textContent =
`Item: ${exactName}
Success: ${data.success}
Lowest price: ${data.lowest_price || "N/A"}
Median price: ${data.median_price || "N/A"}
Volume: ${data.volume || "N/A"}`;
      } catch (err) {
        summary.textContent = `Error: ${err.message}`;
      }
    }

    function searchExact(exactName) {
      document.getElementById("marketHashName").value = exactName;
      searchSteamPrice(exactName);
    }

    function handleSearch() {
      const input = document.getElementById("marketHashName").value.trim();
      const summary = document.getElementById("summary");

      if (!input) {
        summary.textContent = "Please enter a skin name.";
        return;
      }

      const normalized = normalize(input);

      if (aliases[normalized]) {
        searchSteamPrice(aliases[normalized]);
        return;
      }

      if (exactItems.includes(input)) {
        searchSteamPrice(input);
        return;
      }

      const suggestions = getSuggestions(input);

      if (suggestions.length === 1) {
        searchSteamPrice(suggestions[0]);
        return;
      }

      if (suggestions.length > 1) {
        summary.textContent = `No exact alias match found for: ${input}`;
        renderSuggestions(suggestions);
        return;
      }

      summary.textContent = `No match found for: ${input}`;
      renderSuggestions([]);
    }

    function quickSearch(term) {
      document.getElementById("marketHashName").value = term;
      handleSearch();
    }
  </script>
</body>
</html>
