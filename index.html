<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSFloat Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 24px;
    }

    .card {
      max-width: 920px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 18px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 48px;
      line-height: 1.05;
    }

    .muted {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 12px;
      margin-bottom: 14px;
    }

    input, button {
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 18px;
      box-sizing: border-box;
    }

    input {
      background: #475569;
      color: white;
      width: 100%;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      min-width: 110px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .summary {
      margin-top: 16px;
      background: #0b132b;
      border-radius: 14px;
      padding: 18px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 17px;
    }

    .listings {
      margin-top: 18px;
    }

    .listing {
      background: #111827;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      line-height: 1.5;
      word-break: break-word;
    }

    .listing strong {
      font-size: 18px;
    }

    .label {
      color: #93c5fd;
    }

    @media (max-width: 760px) {
      h1 {
        font-size: 34px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>CSFloat Tracker</h1>

    <div class="muted">
      Use def_index, paint_index, and optional max_float to check real CSFloat listings.
    </div>

    <div class="row">
      <input id="defIndex" type="number" placeholder="def_index" value="9" />
      <input id="paintIndex" type="number" placeholder="paint_index" value="51" />
      <input id="maxFloat" type="number" step="0.0001" placeholder="max_float" value="0.07" />
      <button onclick="searchListings()">Search</button>
    </div>

    <div class="muted">
      Example: AWP | Lightning Strike FN = def_index 9, paint_index 51, max_float 0.07
    </div>

    <div id="summary" class="summary">No search yet.</div>
    <div id="listings" class="listings"></div>
  </div>

  <script>
    async function searchListings() {
      const defIndex = document.getElementById("defIndex").value.trim();
      const paintIndex = document.getElementById("paintIndex").value.trim();
      const maxFloat = document.getElementById("maxFloat").value.trim();

      const summary = document.getElementById("summary");
      const listingsDiv = document.getElementById("listings");

      if (!defIndex || !paintIndex) {
        summary.textContent = "Please enter both def_index and paint_index.";
        listingsDiv.innerHTML = "";
        return;
      }

      summary.textContent = "Loading...";
      listingsDiv.innerHTML = "";

      const params = new URLSearchParams({
        def_index: defIndex,
        paint_index: paintIndex
      });

      if (maxFloat !== "") {
        params.set("max_float", maxFloat);
      }

      const url = `/api/search?${params.toString()}`;

      try {
        const res = await fetch(url, {
          headers: {
            "Accept": "application/json"
          }
        });

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          summary.textContent =
`Server did not return JSON.
Status: ${res.status}

Preview:
${text.slice(0, 500)}`;
          return;
        }

        const listings = Array.isArray(data.data) ? data.data : [];

        if (!res.ok) {
          summary.textContent =
`Request failed.
Status: ${res.status}

${JSON.stringify(data, null, 2)}`;
          return;
        }

        if (listings.length === 0) {
          summary.textContent = "No listings found.";
          return;
        }

        const lowest = listings[0];

        summary.textContent =
`Status: ${res.status}
Count loaded: ${listings.length}
Lowest price: $${(lowest.price / 100).toFixed(2)}
Item: ${lowest.item.market_hash_name}
Lowest float: ${lowest.item.float_value}
Listing ID: ${lowest.id}`;

        listingsDiv.innerHTML = listings.map((x, i) => {
          const sellerName = x.seller && x.seller.username ? x.seller.username : "Private/Hidden";
          const inspect = x.item && x.item.inspect_link ? x.item.inspect_link : "N/A";

          return `
            <div class="listing">
              <strong>#${i + 1} - $${(x.price / 100).toFixed(2)}</strong><br>
              <span class="label">Item:</span> ${x.item.market_hash_name}<br>
              <span class="label">Float:</span> ${x.item.float_value}<br>
              <span class="label">Paint Seed:</span> ${x.item.paint_seed}<br>
              <span class="label">Listing ID:</span> ${x.id}<br>
              <span class="label">Seller:</span> ${sellerName}<br>
              <span class="label">Inspect:</span> ${inspect}
            </div>
          `;
        }).join("");
      } catch (err) {
        summary.textContent = `Error: ${err.message}`;
      }
    }
  </script>
</body>
</html>
