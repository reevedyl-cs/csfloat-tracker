<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSFloat Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
      margin: 0;
      padding: 20px;
    }
    .card {
      max-width: 900px;
      margin: 0 auto;
      background: #1f2937;
      border-radius: 14px;
      padding: 20px;
    }
    h1 {
      margin-top: 0;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 16px;
    }
    input, button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }
    input {
      background: #374151;
      color: white;
    }
    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    .muted {
      color: #9ca3af;
      font-size: 14px;
    }
    .result {
      margin-top: 20px;
      background: #111827;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .listing {
      border-top: 1px solid #374151;
      padding: 12px 0;
    }
    a {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>CSFloat Tracker</h1>
    <p class="muted">Use def_index, paint_index, and optional max_float to check real CSFloat listings.</p>

    <div class="row">
      <input id="defIndex" type="number" placeholder="def_index (example: 9)" value="9" />
      <input id="paintIndex" type="number" placeholder="paint_index (example: 51)" value="51" />
      <input id="maxFloat" type="number" step="0.0001" placeholder="max_float (example: 0.07)" value="0.07" />
      <button onclick="searchListings()">Search</button>
    </div>

    <p class="muted">
      Example: AWP | Lightning Strike FN = def_index 9, paint_index 51, max_float 0.07
    </p>

    <div id="summary" class="result">No search yet.</div>
    <div id="listings"></div>
  </div>

  <script>
    async function searchListings() {
      const defIndex = document.getElementById("defIndex").value.trim();
      const paintIndex = document.getElementById("paintIndex").value.trim();
      const maxFloat = document.getElementById("maxFloat").value.trim();

      const summary = document.getElementById("summary");
      const listingsDiv = document.getElementById("listings");

      summary.textContent = "Loading...";
      listingsDiv.innerHTML = "";

      const params = new URLSearchParams({
        def_index: defIndex,
        paint_index: paintIndex,
        limit: "10",
        sort_by: "lowest_price"
      });

      if (maxFloat !== "") {
        params.set("max_float", maxFloat);
      }

      const url = `https://csfloat.com/api/v1/listings?${params.toString()}`;

      try {
        const res = await fetch(url, {
          headers: {
            "Accept": "application/json"
          }
        });

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          summary.textContent = `CSFloat did not return JSON.\nStatus: ${res.status}\n\nPreview:\n${text.slice(0, 500)}`;
          return;
        }

        if (!Array.isArray(data.data)) {
          summary.textContent = `Unexpected response:\n${JSON.stringify(data, null, 2)}`;
          return;
        }

        const listings = data.data;

        if (listings.length === 0) {
          summary.textContent = "No listings found.";
          return;
        }

        const lowest = listings[0];
        summary.textContent =
`Status: ${res.status}
Count loaded: ${listings.length}
Lowest price: $${(lowest.price / 100).toFixed(2)}
Item: ${lowest.item.market_hash_name}
Lowest float: ${lowest.item.float_value}
Listing ID: ${lowest.id}`;

        listingsDiv.innerHTML = listings.map((x, i) => {
          const inspect = x.item.inspect_link || "N/A";
          return `
            <div class="listing">
              <strong>#${i + 1} - $${(x.price / 100).toFixed(2)}</strong><br>
              Item: ${x.item.market_hash_name}<br>
              Float: ${x.item.float_value}<br>
              Paint Seed: ${x.item.paint_seed}<br>
              Listing ID: ${x.id}<br>
              Seller: ${x.seller?.username || "Private/Hidden"}<br>
              ${inspect !== "N/A" ? `Inspect: <span class="muted">${inspect}</span>` : ""}
            </div>
          `;
        }).join("");

      } catch (err) {
        summary.textContent = `Error: ${err.message}`;
      }
    }
  </script>
</body>
</html>
