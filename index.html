<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steam Market Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 24px;
    }

    .card {
      max-width: 920px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 18px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 40px;
    }

    .muted {
      color: #94a3b8;
      font-size: 15px;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    input, button {
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 18px;
      box-sizing: border-box;
      width: 100%;
    }

    input {
      background: #475569;
      color: white;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      margin-top: 12px;
    }

    .dropdown {
      position: relative;
      margin-top: 8px;
      background: #111827;
      border-radius: 12px;
      overflow: hidden;
      z-index: 20;
      border: 1px solid #334155;
    }

    .dropdown-item {
      padding: 14px;
      border-bottom: 1px solid #1f2937;
      cursor: pointer;
      font-size: 16px;
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .dropdown-item:active {
      background: #1f2937;
    }

    .summary {
      margin-top: 16px;
      background: #0b132b;
      border-radius: 14px;
      padding: 18px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 17px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Steam Market Tracker</h1>

    <div class="muted">
      Start typing something close, like <b>bla</b>, <b>lightning</b>, or <b>fire serp</b>.
    </div>

    <div class="search-wrap">
      <input
        id="marketHashName"
        type="text"
        placeholder="Type a skin name..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
      />
      <div id="dropdown" class="dropdown" style="display:none;"></div>
    </div>

    <button onclick="searchSteamPrice()">Search</button>

    <div id="summary" class="summary">No search yet.</div>
  </div>

  <script src="/skins.js"></script>
  <script>
    const input = document.getElementById("marketHashName");
    const dropdown = document.getElementById("dropdown");
    const summary = document.getElementById("summary");

    function normalize(text) {
      return text
        .toLowerCase()
        .replace(/[|()-]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getMatches(query) {
      const q = normalize(query);
      if (!q || q.length < 2) return [];

      return SKINS.filter(item => normalize(item).includes(q)).slice(0, 8);
    }

    function renderDropdown(matches) {
      if (!matches.length) {
        dropdown.style.display = "none";
        dropdown.innerHTML = "";
        return;
      }

      dropdown.innerHTML = matches.map(item => `
        <div class="dropdown-item" data-item="${item.replace(/"/g, '&quot;')}">${item}</div>
      `).join("");

      dropdown.style.display = "block";
    }

    dropdown.addEventListener("click", (e) => {
      const row = e.target.closest(".dropdown-item");
      if (!row) return;
      const item = row.getAttribute("data-item");
      input.value = item;
      dropdown.style.display = "none";
      dropdown.innerHTML = "";
    });

    input.addEventListener("input", () => {
      renderDropdown(getMatches(input.value));
    });

    input.addEventListener("focus", () => {
      renderDropdown(getMatches(input.value));
    });

    async function searchSteamPrice() {
      const marketHashName = input.value.trim();

      if (!marketHashName) {
        summary.textContent = "Please enter a skin name.";
        return;
      }

      summary.textContent = "Loading...";
      dropdown.style.display = "none";

      const params = new URLSearchParams({
        market_hash_name: marketHashName,
        currency: "1"
      });

      try {
        const res = await fetch(`/api/steam-price?${params.toString()}`, {
          headers: { Accept: "application/json" }
        });

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          summary.textContent = `Server did not return JSON.\nStatus: ${res.status}\n\nPreview:\n${text.slice(0, 500)}`;
          return;
        }

        if (!res.ok) {
          summary.textContent = `Request failed.\nStatus: ${res.status}\n\n${JSON.stringify(data, null, 2)}`;
          return;
        }

        summary.textContent =
`Item: ${marketHashName}
Success: ${data.success}
Lowest price: ${data.lowest_price || "N/A"}
Median price: ${data.median_price || "N/A"}
Volume: ${data.volume || "N/A"}`;
      } catch (err) {
        summary.textContent = `Error: ${err.message}`;
      }
    }
  </script>
</body>
</html>
