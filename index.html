<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Steam Market Collection Scanner</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
padding:12px;
border-radius:8px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
margin:6px;
}

button:hover{
background:#1d4ed8;
}

.scanner-item{
background:#0b132b;
padding:16px;
border-radius:10px;
margin-bottom:10px;
}

.scanner-name{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.scanner-meta{
color:#cbd5e1;
white-space:pre-line;
}

.score-high{color:#ef4444}
.score-mid{color:#f97316}
.score-watch{color:#facc15}
.score-low{color:#22c55e}

</style>
</head>


<body>

<div class="card">

<h2>Steam Collection Scanner</h2>

<div id="status">
Loading skin database...
</div>

</div>


<div class="card">

<h3>Collection Scan</h3>

<div id="collectionButtons"></div>

</div>


<div class="card">

<h3>Scanner Results</h3>

<div id="results"></div>

</div>



<script>

let SKINS=[]
let COLLECTIONS={}

function baseName(name){
return name.replace(/\s*\((Factory New|Minimal Wear|Field-Tested|Well-Worn|Battle-Scarred)\)/,"").trim()
}

function bestWear(list){

const order=[
"Factory New",
"Minimal Wear",
"Field-Tested",
"Well-Worn",
"Battle-Scarred"
]

for(let w of order){

let found=list.find(x=>x.wear_name===w)

if(found) return found
}

return list[0]

}


async function loadSkins(){

let res=await fetch("/api/skins")
let data=await res.json()

SKINS=data.skins

for(let s of SKINS){

let col=s.collection

if(!COLLECTIONS[col]) COLLECTIONS[col]={}

let base=baseName(s.market_hash_name)

if(!COLLECTIONS[col][base]) COLLECTIONS[col][base]=[]

COLLECTIONS[col][base].push(s)

}

renderCollections()

document.getElementById("status").innerText=
"Loaded "+SKINS.length+" skins"

}

function renderCollections(){

let div=document.getElementById("collectionButtons")

let html=""

Object.keys(COLLECTIONS)
.sort()
.forEach(c=>{

let count=Object.keys(COLLECTIONS[c]).length

html+=`<button onclick="scanCollection('${c}')">${c} (${count})</button>`

})

div.innerHTML=html

}



async function steamPrice(name){

let url="/api/steam-price?market_hash_name="+encodeURIComponent(name)

let r=await fetch(url)

return r.json()

}

async function steamHistory(name){

let url="/api/steam-history?market_hash_name="+encodeURIComponent(name)

let r=await fetch(url)

return r.json()

}



function num(x){

if(!x) return NaN

return parseFloat(
x.replace(/[^0-9.,]/g,"")
.replace(",",".")
)

}


function score(price,history){

let lowest=num(price.lowest_price)

let median=history.median_7d || num(price.median_price)

let sales=history.sales_7d || 0

if(!lowest || !median) return null

let premium=(lowest-median)/median*100

let score=0

if(premium>40) score+=40
else if(premium>20) score+=25
else if(premium>10) score+=15

if(sales<=2) score+=30
else if(sales<=5) score+=20
else if(sales<=10) score+=10

return Math.min(100,Math.round(score))

}



function scoreClass(score){

if(score===null) return "score-low"

if(score>=70) return "score-high"
if(score>=45) return "score-mid"
if(score>=25) return "score-watch"

return "score-low"

}



async function scanCollection(collection){

let resultsDiv=document.getElementById("results")

resultsDiv.innerHTML="Scanning "+collection+"..."

let bases=Object.keys(COLLECTIONS[collection])

let list=[]

for(let i=0;i<bases.length;i++){

let variants=COLLECTIONS[collection][bases[i]]

let best=bestWear(variants)

let name=best.market_hash_name

document.getElementById("status").innerText=
`Scanning ${collection} ${i+1}/${bases.length}`

try{

let price=await steamPrice(name)

let history=await steamHistory(name)

let s=score(price,history)

list.push({
name,
wear:best.wear_name,
lowest:price.lowest_price,
median:history.median_7d,
sales:history.sales_7d,
score:s
})

}catch(e){

list.push({
name,
wear:best.wear_name,
score:null
})

}

await new Promise(r=>setTimeout(r,4200))

}


list.sort((a,b)=>{

let A=a.score ?? -1
let B=b.score ?? -1

return B-A

})


resultsDiv.innerHTML=list.map((x,i)=>`

<div class="scanner-item">

<div class="scanner-name">${i+1}. ${x.name}</div>

<div class="scanner-meta">

Wear: ${x.wear}

Lowest: ${x.lowest || "N/A"}

7d Median: ${x.median ? "$"+x.median.toFixed(2) : "N/A"}

7d Sales: ${x.sales ?? "N/A"}

Score: <span class="${scoreClass(x.score)}">${x.score ?? "--"}/100</span>

</div>

</div>

`).join("")

}



loadSkins()

</script>


</body>
</html>
